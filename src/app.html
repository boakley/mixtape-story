<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16.png" />
    <link rel="alternate icon" href="%sveltekit.assets%/favicon.ico" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fdfcf8" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-paper text-ink antialiased">
    <div style="display: contents">%sveltekit.body%</div>
    <!-- Cloudflare Web Analytics. The zone's automatic injection doesn't
         reach this Pages-Function-rendered app (verified in-browser
         2026-07-10), so the beacon ships explicitly. Same token as the
         zone's WA site; segment by host in the dashboard. -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "b7c97b83723c429592b2ab4490f53f47"}'
    ></script>
  </body>
</html>
